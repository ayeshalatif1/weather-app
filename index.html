<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div>
            <form action="">
                <input type="text" name="city" id="city-input">
                <input type="submit" id="search-btn" value="Search">
            </form>
        </div>
    </header>
    <main>
        <div>
            <h1>France</h1>
            <p>
                <span class="date">Tuesday 14:49</span>, <span class="condition">scattered clouds</span>
                <br>
                Humidity: <span class="humidity">66%</span>, Wind: <span class="wind">3.13km/h</span>
            </p>
        </div>

        <div>
            <p>🌤️ 12°C</p>
        </div>
    </main>
    <footer>
        <p>This page is coded by <a href="">Ayesha Latif</a>. The code is avilable on <a href="">GitHub</a> and hosted on <a href="">Netlify</a></p>
    </footer>



    <script src="style.css"></script>
</body>

</html>
