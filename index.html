<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div>
                <form action="" id="input-form">
                    <input type="text" name="city" id="city-input" placeholder="Enter a City">
                    <input type="submit" id="search-btn" value="Search">
                </form>
            </div>
        </header>
        <main>
            <div>
                <h1 id="city-name">France</h1>
                <p>
                    <span id="date">Tuesday 14:49</span>, <span id="condition">scattered clouds</span>
                    <br>
                    Humidity: <strong id="humidity">66%</strong>, Wind: <strong id="wind">3.13km/h</strong>
                </p>
            </div>

            <div class="temp-wrapper">
                <div id="icon">🌤️</div>
                <div class="temp" id="temp">12</div>
                <div class="unit">°C</div>
            </div>
        </main>
        <footer>
            <p>This page is coded by <a href="">Ayesha Latif</a>. The code is avilable on <a href="https://github.com/ayeshalatif1/weather-app">GitHub</a> and
                hosted on <a href="">Netlify</a></p>
        </footer>
    </div>



    <script src="script.js"></script>
</body>

</html>
